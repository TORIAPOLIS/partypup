<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Event Checklist ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1A47B8;
    --red: #D0021B;
    --yellow: #F5C800;
    --white: #FFFDF0;
    --dark: #1a1a2e;
    --blue-light: #dce8ff;
    --red-light: #ffe0e3;
    --yellow-light: #fff8cc;
    --shadow: 4px 4px 0px rgba(0,0,0,0.85);
    --shadow-sm: 2px 2px 0px rgba(0,0,0,0.85);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--white);
    background-image:
      radial-gradient(circle at 10% 20%, rgba(26,71,184,0.08) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(208,2,27,0.08) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(245,200,0,0.08) 0%, transparent 60%);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  /* Dot pattern overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  .page-wrapper {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .title-badge {
    display: inline-block;
    background: var(--yellow);
    border: 3px solid var(--dark);
    box-shadow: var(--shadow);
    border-radius: 20px;
    padding: 12px 36px;
    margin-bottom: 10px;
    transform: rotate(-1deg);
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--dark);
    letter-spacing: 1px;
    line-height: 1;
  }

  .subtitle {
    font-size: 1rem;
    color: #555;
    font-weight: 700;
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  /* Stars decoration */
  .stars {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;
    font-size: 1.4rem;
  }

  /* Progress bar */
  .progress-container {
    background: #fff;
    border: 3px solid var(--dark);
    border-radius: 50px;
    box-shadow: var(--shadow);
    padding: 12px 20px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .progress-label {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: var(--dark);
    white-space: nowrap;
    min-width: 70px;
  }

  .progress-bar-bg {
    flex: 1;
    height: 20px;
    background: #eee;
    border-radius: 50px;
    border: 2px solid var(--dark);
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--yellow);
    border-radius: 50px;
    transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s ease;
    width: 0%;
  }

  .progress-bar-fill.complete {
    background: #2E7D32;
  }

  .progress-count {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: var(--dark);
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }

  /* Sections grid */
  .sections-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
  }

  .section-card {
    background: #fff;
    border: 3px solid var(--dark);
    border-radius: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .section-header {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--dark);
  }

  .section-card[data-section="inventory"] .section-header { background: var(--blue); }
  .section-card[data-section="setup"] .section-header { background: var(--red); }
  .section-card[data-section="personal"] .section-header { background: var(--yellow); }

  .section-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-card[data-section="personal"] .section-title { color: var(--dark); }

  .section-count {
    font-family: 'Fredoka One', cursive;
    font-size: 0.9rem;
    background: rgba(255,255,255,0.3);
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 50px;
    padding: 2px 10px;
    color: #fff;
  }

  .section-card[data-section="personal"] .section-count { color: var(--dark); border-color: rgba(0,0,0,0.3); background: rgba(0,0,0,0.12); }

  /* Checklist items */
  .checklist {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 40px;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 12px;
    border: 2px solid transparent;
    transition: all 0.2s ease;
    cursor: pointer;
    user-select: none;
    position: relative;
  }

  .check-item:hover {
    background: #f8f8f8;
    border-color: #ddd;
  }

  .check-item.checked {
    opacity: 0.65;
  }

  .check-item.checked .item-label {
    text-decoration: line-through;
    color: #999;
  }

  /* Custom checkbox */
  .check-box {
    width: 26px;
    height: 26px;
    border: 3px solid var(--dark);
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    transition: all 0.15s ease;
    font-size: 1rem;
    box-shadow: var(--shadow-sm);
  }

  .section-card[data-section="inventory"] .check-item.checked .check-box { background: var(--blue); border-color: var(--blue); }
  .section-card[data-section="setup"] .check-item.checked .check-box { background: var(--red); border-color: var(--red); }
  .section-card[data-section="personal"] .check-item.checked .check-box { background: var(--yellow); border-color: var(--dark); }

  .check-mark { display: none; font-size: 14px; }
  .check-item.checked .check-mark { display: block; color: #fff; }
  .section-card[data-section="personal"] .check-item.checked .check-mark { color: var(--dark); }

  .item-label {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--dark);
    flex: 1;
  }

  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    opacity: 0;
    transition: opacity 0.15s;
    padding: 2px 4px;
    border-radius: 6px;
    line-height: 1;
  }

  .check-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: var(--red-light); }

  /* Add item form */
  .add-item-area {
    padding: 8px 16px 14px;
    border-top: 2px dashed #ddd;
  }

  .add-form {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .add-input {
    flex: 1;
    border: 2px solid #ccc;
    border-radius: 10px;
    padding: 8px 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    outline: none;
    background: var(--white);
    transition: border-color 0.2s;
  }

  .add-input:focus { border-color: var(--dark); }

  .add-btn {
    background: var(--dark);
    color: #fff;
    border: 2px solid var(--dark);
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform 0.1s, box-shadow 0.1s;
    line-height: 1;
  }

  .add-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 rgba(0,0,0,0.85); }
  .add-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 rgba(0,0,0,0.85); }

  /* Reset button */
  .actions-bar {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .reset-btn {
    background: #fff;
    border: 3px solid var(--dark);
    border-radius: 50px;
    padding: 10px 28px;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
    color: var(--dark);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .reset-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 rgba(0,0,0,0.85); }
  .reset-btn:active { transform: translate(1px,1px); box-shadow: 2px 2px 0 rgba(0,0,0,0.85); }

  /* Confetti celebration */
  .celebrate {
    position: fixed;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    z-index: 999;
    display: flex;
    justify-content: center;
    font-size: 2rem;
    gap: 8px;
    padding-top: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .celebrate.show { opacity: 1; animation: celebratePop 3s forwards; }

  @keyframes celebratePop {
    0% { opacity: 0; transform: translateY(-20px); }
    15% { opacity: 1; transform: translateY(0); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-10px); }
  }

  /* Empty state */
  .empty-hint {
    text-align: center;
    color: #bbb;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 8px 0 4px;
  }

  @media (max-width: 600px) {
    .sections-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="page-wrapper">
  <header>
    <div class="title-badge">
      <h1>Event Checklist✨</h1>
    </div>
    <div class="stars">⭐ 🌟 ⭐ 🌟 ⭐</div>
  </header>

  <div class="progress-container">
    <div class="progress-label" id="progressEmoji">📦 Ready?</div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-count" id="progressCount">0 / 0</div>
  </div>

  <div class="sections-grid" id="sectionsGrid"></div>

  <div class="actions-bar">
    <button class="reset-btn" onclick="resetAll()">🔄 Uncheck All</button>
    <button class="reset-btn" onclick="restoreDefaults()">↩️ Restore Defaults</button>
  </div>
</div>

<div class="celebrate" id="celebrate">🎉 🌟 🎊 ✨ 🎈</div>

<script>
const DEFAULT_DATA = {
  inventory: {
    label: "Inventory",
    icon: "🛍️",
    items: ["Mystery Bags","XL Bags","Sticker Lucky","Sticker Sheets","Stickers","Magnets","Ornaments","Sticker Flakes","Notepads","Sketchbooks","Art Prints","Clothing","Totebags"]
  },
  setup: {
    label: "Set Up",
    icon: "✨",
    items: ["Pencil Bag","Signage","Tape","Business Cards","Sticker Bags","Table Runner","Table Cloths","Cardboard Boxes","Backdrop Stand","Display Cut-outs","Display stands","Acrylic stands","Collapsible bins","Wagon"]
  },
  personal: {
    label: "Personal",
    icon: "🎒",
    items: ["Money box","Battery Packs","Money Key","Pill box","Chapstick","Tissues","Hand sanitizer","Lotion","Sun glasses","Water Bottles","Apple Sauce","Lunch"]
  }
};

// State
let state = {};

function loadState() {
  try {
    const saved = localStorage.getItem('eventChecklist');
    if (saved) {
      state = JSON.parse(saved);
    } else {
      restoreDefaults(false);
    }
  } catch(e) {
    restoreDefaults(false);
  }
}

function saveState() {
  try { localStorage.setItem('eventChecklist', JSON.stringify(state)); } catch(e) {}
}

function restoreDefaults(doRender = true) {
  state = {};
  for (const [key, data] of Object.entries(DEFAULT_DATA)) {
    state[key] = {
      items: data.items.map(name => ({ name, checked: false }))
    };
  }
  saveState();
  if (doRender) render();
}

function resetAll() {
  for (const key of Object.keys(state)) {
    state[key].items.forEach(item => item.checked = false);
  }
  saveState();
  render();
}

function toggleItem(sectionKey, index) {
  state[sectionKey].items[index].checked = !state[sectionKey].items[index].checked;
  const checked = state[sectionKey].items[index].checked;
  saveState();

  // Update DOM directly for instant visual feedback
  const list = document.getElementById(`list-${sectionKey}`);
  if (list) {
    const checkItems = list.querySelectorAll('.check-item');
    const el = checkItems[index];
    if (el) {
      if (checked) {
        el.classList.add('checked');
      } else {
        el.classList.remove('checked');
      }
    }
  }

  updateProgress();
  updateSectionCount(sectionKey);
  const allDone = getAllItems().every(i => i.checked) && getAllItems().length > 0;
  if (allDone) showCelebrate();
}

function deleteItem(sectionKey, index) {
  state[sectionKey].items.splice(index, 1);
  saveState();
  render();
}

function addItem(sectionKey) {
  const input = document.getElementById(`input-${sectionKey}`);
  const name = input.value.trim();
  if (!name) return;
  state[sectionKey].items.push({ name, checked: false });
  input.value = '';
  saveState();
  render();
  // scroll to bottom of that section
  setTimeout(() => {
    const list = document.getElementById(`list-${sectionKey}`);
    if (list) list.scrollTop = list.scrollHeight;
  }, 50);
}

function getAllItems() {
  return Object.values(state).flatMap(s => s.items);
}

function updateProgress() {
  const all = getAllItems();
  const done = all.filter(i => i.checked).length;
  const total = all.length;
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  const fill = document.getElementById('progressFill');
  fill.style.width = pct + '%';
  if (pct === 100 && total > 0) {
    fill.classList.add('complete');
  } else {
    fill.classList.remove('complete');
  }
  document.getElementById('progressCount').textContent = `${done} / ${total}`;
  const emojis = pct === 0 ? '📦 Ready?' : pct < 50 ? '🚀 Loading...' : pct < 100 ? '🔥 Almost!' : '🎉 Let\'s go!';
  document.getElementById('progressEmoji').textContent = emojis;
}

function updateSectionCount(sectionKey) {
  const items = state[sectionKey].items;
  const done = items.filter(i => i.checked).length;
  const el = document.getElementById(`count-${sectionKey}`);
  if (el) el.textContent = `${done}/${items.length}`;
}

function showCelebrate() {
  const el = document.getElementById('celebrate');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3200);
}

function render() {
  const grid = document.getElementById('sectionsGrid');
  grid.innerHTML = '';

  const keys = Object.keys(DEFAULT_DATA);
  for (const sectionKey of keys) {
    const meta = DEFAULT_DATA[sectionKey];
    const items = state[sectionKey]?.items || [];
    const done = items.filter(i => i.checked).length;

    const card = document.createElement('div');
    card.className = 'section-card';
    card.dataset.section = sectionKey;

    const itemsHTML = items.length === 0
      ? `<div class="empty-hint">No items yet — add one below!</div>`
      : items.map((item, i) => `
        <div class="check-item ${item.checked ? 'checked' : ''}" onclick="toggleItem('${sectionKey}', ${i})">
          <div class="check-box">
            <span class="check-mark">✓</span>
          </div>
          <span class="item-label">${escapeHtml(item.name)}</span>
          <button class="delete-btn" onclick="event.stopPropagation(); deleteItem('${sectionKey}', ${i})" title="Remove item">✕</button>
        </div>
      `).join('');

    card.innerHTML = `
      <div class="section-header">
        <div class="section-title">${meta.icon} ${meta.label}</div>
        <div class="section-count" id="count-${sectionKey}">${done}/${items.length}</div>
      </div>
      <div class="checklist" id="list-${sectionKey}">
        ${itemsHTML}
      </div>
      <div class="add-item-area">
        <div class="add-form">
          <input
            class="add-input"
            id="input-${sectionKey}"
            type="text"
            placeholder="Add item..."
            onkeydown="if(event.key==='Enter') addItem('${sectionKey}')"
          />
          <button class="add-btn" onclick="addItem('${sectionKey}')">+</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  }

  updateProgress();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadState();
render();
</script>
</body>
</html>
